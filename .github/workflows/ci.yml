name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ugorjbe_test
          POSTGRES_USER: ugorjbe_test
          POSTGRES_PASSWORD: ugorjbe_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ugorjbe_test -d ugorjbe_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      UGORJBE_TEST_CONNECTION: Host=localhost;Port=5432;Database=ugorjbe_test;Username=ugorjbe_test;Password=ugorjbe_test_password;Include Error Detail=true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore UgorjBe.sln --locked-mode
      - name: Build
        run: dotnet build UgorjBe.sln -c Release --no-restore
      - name: Verify formatting
        run: dotnet format UgorjBe.sln --verify-no-changes --no-restore
      - name: Unit tests
        run: dotnet test tests/UgorjBe.UnitTests/UgorjBe.UnitTests.csproj -c Release --no-build
      - name: PostgreSQL integration tests
        shell: bash
        run: |
          if ! dotnet test tests/UgorjBe.IntegrationTests/UgorjBe.IntegrationTests.csproj -c Release --no-build > /tmp/backend-integration.log 2>&1; then
            echo "--- Backend integration failure (last 500 lines) ---"
            tail -n 500 /tmp/backend-integration.log
            exit 1
          fi
          tail -n 80 /tmp/backend-integration.log
      - name: Upload backend integration failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-log
          path: /tmp/backend-integration.log
          if-no-files-found: ignore
          retention-days: 3

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
      - name: Test, lint, and build debug APK
        shell: bash
        run: |
          if ! bash ./gradlew testDebugUnitTest lintDebug assembleDebug assembleDebugAndroidTest --no-daemon > /tmp/android-gradle.log 2>&1; then
            echo "--- Android Gradle failure (last 500 lines) ---"
            tail -n 500 /tmp/android-gradle.log
            exit 1
          fi
          tail -n 80 /tmp/android-gradle.log
      - name: Upload Android Gradle failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-gradle-log
          path: /tmp/android-gradle.log
          if-no-files-found: error
          retention-days: 3

  web-admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: npm
          cache-dependency-path: web-admin/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit and component tests
        run: npm test
      - name: Production build
        run: npm run build

  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Prepare development configuration
        run: cp .env.example .env
      - name: Build and start the stack
        run: docker compose up --build --detach
      - name: Verify API health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:8081/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1
      - name: Verify administration web and proxy
        run: |
          curl --fail --silent --retry 20 --retry-delay 2 --retry-connrefused http://localhost:8080/ > /dev/null
          curl --fail --silent http://localhost:8080/health > /dev/null
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: npm
          cache-dependency-path: web-admin/package-lock.json
      - name: Install browser smoke dependencies
        working-directory: web-admin
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Integrated administration smoke test
        working-directory: web-admin
        env:
          E2E_BASE_URL: http://localhost:8080
          E2E_NO_WEBSERVER: "1"
        run: npm run test:e2e
      - name: Stop the stack
        if: always()
        run: docker compose down --volumes
