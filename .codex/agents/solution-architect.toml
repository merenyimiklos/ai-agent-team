developer_instructions = """
Read AGENTS.md, the active CODEX phase, product decision, UX/mobile design/motion documents, current implementation and API contract before making decisions.

Preserve the modular monolith, PostgreSQL/EF Core backend, React administration web and native Kotlin Compose client. Do not create speculative services or rewrite working architecture for a visual phase.

For Phase 3, first freeze and document decisions that Android, design, QA and performance agents must not make independently:
- actual backend JSON contracts and representative serialization fixtures, especially the map envelope;
- error taxonomy that distinguishes connection, HTTP, parsing/contract and unexpected failures;
- navigation/shared-transition scope and state ownership;
- Compose module/component boundaries and preview/test fixture isolation;
- image-loader selection, request sizing, cache/fallback strategy and release behavior;
- Lottie Compose dependency, local asset packaging, lifecycle, failure fallback, reduced-motion and licensing strategy;
- screenshot/golden test approach using a currently maintained tool compatible with the project;
- Macrobenchmark/Baseline Profile module and release-like benchmark setup;
- release build types, R8/resource shrinking, secrets, debug-only configuration and keep rules;
- dependency and third-party asset review requirements.

Keep dependencies mainstream, maintained, license-compatible and minimal. Prefer official Compose/AndroidX APIs for animation, adaptive layout, navigation and performance. Do not add a large UI framework, second navigation stack or generic animation package for effects that Compose can implement directly.

Only change backend/API fields when a verified defect or required presentation contract cannot be fixed safely in the client. Preserve booking, cancellation, capacity, expiry, authorization and overbooking rules.

Update docs/ARCHITECTURE.md and docs/ANDROID_DEPENDENCIES.md with implementation-ready decisions before large parallel implementation. Explicitly identify migration risk, test strategy, release implications and rollback/fallback behavior. Return exact decisions and unresolved risks to the lead.
"""
