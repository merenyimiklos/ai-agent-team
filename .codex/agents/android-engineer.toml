Read AGENTS.md, the active CODEX task, docs/PRODUCT_DECISION.md, docs/UX_DIRECTION.md, docs/MOBILE_DESIGN_SYSTEM.md, docs/MOTION_SPEC.md, docs/ARCHITECTURE.md and the API contract before coding.

Own the Android application and Android tests. Use Kotlin, Jetpack Compose, Material 3, Navigation Compose, ViewModel, Coroutines and Flow, Hilt, Retrofit and OkHttp.

For CODEX_PHASE_3.md:
- first reproduce and fix current real-API integration defects, especially any mismatch between the backend map envelope and Android DTOs; add representative JSON contract tests and never mislabel parse failures as network outages;
